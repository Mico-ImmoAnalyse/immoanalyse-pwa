<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>ImmoAnalyse v6</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="light">

  <div class="container">

    <h1>ImmoAnalyse v6 — Audit Projet</h1>

    <!-- ============================================================
         FORMULAIRE PROJET
    ============================================================= -->

    <div class="card">
      <h2>Informations projet</h2>

      <label>Nom du projet</label>
      <input id="nomProjet" type="text" placeholder="Nom du projet" />

      <label>Type d’investissement</label>
      <select id="projectType">
        <option value="MDB">MDB</option>
        <option value="LDT">LDT</option>
      </select>

      <h3>Ratios MDB</h3>
      <label>LTV (%)</label><input id="ltv" type="number" />
      <label>LTA (%)</label><input id="lta" type="number" />
      <label>LTC (%)</label><input id="ltc" type="number" />
      <label>Marge (%)</label><input id="marge" type="number" />
      <label>Pré-commercialisation (%)</label><input id="precomm" type="number" />
      <label>Liquidité (mois)</label><input id="liq" type="number" />
      <label>Mise (€)</label><input id="mise" type="number" />

      <h3>LDT</h3>
      <label>Montant recherché (€)</label><input id="ldt_montant" type="number" />
      <label>Durée (mois)</label><input id="ldt_duree" type="number" />
      <label>Taux (%)</label><input id="ldt_taux" type="number" />
      <label>Remboursement par cycle (€)</label><input id="ldt_remboursement" type="number" />
      <label>Fréquence</label>
      <select id="ldt_frequence">
        <option value="mensuel">Mensuel</option>
        <option value="trimestriel">Trimestriel</option>
        <option value="semestriel">Semestriel</option>
        <option value="annuel">Annuel</option>
        <option value="in_fine">In fine</option>
      </select>
    </div>

    <!-- ============================================================
         GARANTIES
    ============================================================= -->

    <div class="card">
      <h2>Garanties</h2>

      <label><input type="checkbox" id="fiducie" /> Fiducie (%)</label>
      <input id="fiducie_pct" type="number" disabled />

      <label><input type="checkbox" id="g1d" /> Garantie 1er rang (%)</label>
      <input id="g1d_pct" type="number" disabled />

      <label><input type="checkbox" id="hyp1" /> Hypothèque 1er rang (%)</label>
      <input id="hyp1_pct" type="number" disabled />

      <label><input type="checkbox" id="nantissement" /> Nantissement (%)</label>
      <input id="nantissement_pct" type="number" disabled />

      <label><input type="checkbox" id="caution" /> Caution (€)</label>
      <input id="caution_eur" type="number" disabled />
    </div>

    <!-- ============================================================
         BOUTON AUDIT
    ============================================================= -->

    <button onclick="runEngine()" class="btn-primary">AUDITER & SAUVEGARDER</button>

    <!-- ============================================================
         TABLEAU PROJETS
    ============================================================= -->

    <div class="card">
      <h2>Portefeuille</h2>
      <p class="note">Aucun projet</p>

      <table>
        <thead>
          <tr>
            <th>Projet</th>
            <th>LTV net</th>
            <th>Risque</th>
            <th>Ticket IA</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableProjets"></tbody>
      </table>

      <div class="stats">
        <div>Total investi : <span id="totalInvesti">0 €</span></div>
        <div>Score portefeuille : <span id="scorePortefeuille">0/100</span></div>
      </div>
    </div>

  </div>

  <!-- ============================================================
       SCRIPT PRINCIPAL
  ============================================================= -->

  <script type="module">
    import { runLPBEngine } from "./engine/engine.js";

    const STORAGE_KEY = "immoanalyse_projets_v6";

    /* UTILITAIRES */
    function readNumber(id) {
      const el = document.getElementById(id);
      if (!el) return null;
      const v = parseFloat(String(el.value).replace(",", "."));
      return isNaN(v) ? null : v;
    }

    function readCheckbox(id) {
      const el = document.getElementById(id);
      return el ? !!el.checked : false;
    }

    function formatTickets(ticketIA) {
      if (!ticketIA || !ticketIA.plage) return "-";
      const { min, max } = ticketIA.plage;
      return `${min}–${max} €`;
    }

    function loadProjects() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveProjects(projects) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    /* RENDU TABLEAU */
    function renderProjects() {
      const projects = loadProjects();
      const tableBody = document.getElementById("tableProjets");
      tableBody.innerHTML = "";

      let totalScore = 0;
      let totalMise = 0;

      projects.forEach((p, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${p.nom} (${p.type})</td>
          <td>${p.ltvNet ?? "-"}</td>
          <td>${p.risque ?? "-"}</td>
          <td>${p.tickets ?? "-"}</td>
          <td><button onclick="deleteProject(${index})">🗑️</button></td>
        `;

        tableBody.appendChild(tr);

        if (typeof p.score === "number") totalScore += p.score;
        if (typeof p.mise === "number") totalMise += p.mise;
      });

      const avgScore = projects.length ? totalScore / projects.length : 0;
      document.getElementById("scorePortefeuille").textContent = `${avgScore.toFixed(0)}/100`;
      document.getElementById("totalInvesti").textContent = `${totalMise.toLocaleString("fr-FR")} €`;

      const noteEl = document.querySelector(".note");
      if (projects.length === 0) noteEl.textContent = "Aucun projet";
      else noteEl.textContent = `${projects.length} projet(s) audité(s)`;
    }

    window.deleteProject = function (index) {
      const projects = loadProjects();
      projects.splice(index, 1);
      saveProjects(projects);
      renderProjects();
    };

    /* PONDÉRATION DYNAMIQUE GARANTIES */
    function computeGarantiesDynamiques(garanties, montantProjet) {
      const poids = {
        fiducie: 1.0,
        g1d: 1.0,
        hyp1: 1.0,
        nantissement: 0.6,
        caution: 0.3
      };

      let total = 0;
      let details = {};
      let alertes = [];

      function cap(v) {
        if (v == null) return 0;
        if (v > 150) {
          alertes.push("Couverture >150% : vérifier la cohérence.");
          return 150;
        }
        return Math.max(0, v);
      }

      if (garanties.fiducie.active) {
        const pct = cap(garanties.fiducie.pct);
        const pond = poids.fiducie * (pct / 100);
        total += pond;
        details.fiducie = pond;
      }

      if (garanties.g1d.active) {
        const pct = cap(garanties.g1d.pct);
        const pond = poids.g1d * (pct / 100);
        total += pond;
        details.g1d = pond;
      }

      if (garanties.hyp1.active) {
        const pct = cap(garanties.hyp1.pct);
        const pond = poids.hyp1 * (pct / 100);
        total += pond;
        details.hyp1 = pond;
      }

      if (garanties.nantissement.active) {
        const pct = cap(garanties.nantissement.pct);
        const pond = poids.nantissement * (pct / 100);
        total += pond;
        details.nantissement = pond;
      }

      if (garanties.caution.active && montantProjet > 0) {
        const pct = (garanties.caution.eur / montantProjet) * 100;
        const pctEff = cap(pct);
        const pond = poids.caution * (pctEff / 100);
        total += pond;
        details.caution = pond;
      }

      return { total, details, alertes };
    }

    /* ============================================================
       MOTEUR PRINCIPAL
    ============================================================= */

    window.runEngine = function () {
      const type = document.getElementById("projectType").value;
      const nomProjet = document.getElementById("nomProjet").value || "Projet sans nom";

      const valeurs = {
        LTV: readNumber("ltv"),
        LTA: readNumber("lta"),
        LTC: readNumber("ltc"),
        marge: readNumber("marge"),
        precomm: readNumber("precomm"),
        liquidite: readNumber("liq"),
        mise: readNumber("mise")
      };

      const ldt = {
        montant: readNumber("ldt_montant"),
        duree: readNumber("ldt_duree"),
        taux: readNumber("ldt_taux"),
        remboursement: readNumber("ldt_remboursement"),
        frequence: document.getElementById("ldt_frequence").value
      };

      const garanties = {
        fiducie: { active: readCheckbox("fiducie"), pct: readNumber("fiducie_pct") },
        g1d: { active: readCheckbox("g1d"), pct: readNumber("g1d_pct") },
        hyp1: { active: readCheckbox("hyp1"), pct: readNumber("hyp1_pct") },
        nantissement: { active: readCheckbox("nantissement"), pct: readNumber("nantissement_pct") },
        caution: { active: readCheckbox("caution"), eur: readNumber("caution_eur") }
      };

      const montantProjet = valeurs.mise || ldt.montant || 0;
      const garantiesDyn = computeGarantiesDynamiques(garanties, montantProjet);

      const input = { type, valeurs, garanties, garantiesDyn, ldt };
      const result = runLPBEngine(input);

      const risque = result.meta.securiteGlobale.toUpperCase();
      const tickets = formatTickets(result.ticketIA);

      const projects = loadProjects();
      projects.push({
        nom: nomProjet,
        type,
        ltvNet: valeurs.LTV ?? "-",
        risque,
        tickets,
        score: result.score,
        mise: valeurs.mise || 0
      });

      saveProjects(projects);
      renderProjects();
    };

    /* ============================================================
       ACTIVATION CHAMPS GARANTIES
    ============================================================= */

    function bindGuaranteeToggle(idCheck, idField) {
      const check = document.getElementById(idCheck);
      const field = document.getElementById(idField);
      check.addEventListener("change", () => {
        field.disabled = !check.checked;
        if (!check.checked) field.value = "";
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderProjects();
      bindGuaranteeToggle("fiducie", "fiducie_pct");
      bindGuaranteeToggle("g1d", "g1d_pct");
      bindGuaranteeToggle("hyp1", "hyp1_pct");
      bindGuaranteeToggle("nantissement", "nantissement_pct");
      bindGuaranteeToggle("caution", "caution_eur");
    });
  </script>

</body>
</html>
