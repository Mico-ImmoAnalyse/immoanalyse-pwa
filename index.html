<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoAnalyse v6 PRO</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
--bg: #0f1012;
--bg-section: #18191c;
--bg-card: #202226;
--text: #e7e7ea;
--muted: #a0a0a8;
--accent: #4da3ff;
--border: #2a2c31;
}
.light {
--bg: #f5f6f8;
--bg-section: #ffffff;
--bg-card: #f3f4f7;
--text: #22252b;
--muted: #6b6f78;
--accent: #0077cc;
--border: #d0d3dc;
}
body {
margin: 0;
padding: 0;
background: var(--bg);
color: var(--text);
font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
h1 { margin: 10px 0 4px 0; color: var(--accent); font-size: 22px; }
h2 { margin: 8px 0 6px 0; color: var(--accent); font-size: 18px; }
h3 { margin: 6px 0 4px 0; color: var(--accent); font-size: 15px; }

.container { width: 94%; max-width: 560px; margin: 10px auto 20px auto; }
.section {
background: var(--bg-section);
border: 1px solid var(--border);
padding: 10px;
border-radius: 10px;
margin: 10px auto;
box-shadow: 0 0 8px rgba(0,0,0,0.35);
}

input, select {
width: 100%; padding: 7px 8px; margin: 3px 0 9px 0;
border-radius: 6px; border: 1px solid var(--border);
background: #1b1d22; color: var(--text); font-size: 13px;
}
.light input, .light select { background: #ffffff; }

button {
padding: 10px 14px; background: var(--accent);
border: none; border-radius: 6px; color: #000;
font-weight: 600; cursor: pointer; font-size: 14px;
}
button:hover { background: #6bb4ff; }

.secondary {
background: transparent; border: 1px solid var(--accent); color: var(--accent);
}
.secondary:hover { background: var(--accent); color: #000; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
th, td { border: 1px solid var(--border); padding: 6px 4px; text-align: center; }
th { background: var(--bg-card); }

.header-top { display: flex; justify-content: space-between; align-items: center; }
.header-metrics { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); }

.theme-toggle { position: fixed; top: 14px; right: 14px; }

.guide-panel {
position: fixed; top: 0; right: -380px; width: 360px; height: 100vh;
overflow-y: auto; background: var(--bg-section); border-left: 1px solid var(--border);
padding: 10px 12px; transition: right 0.3s ease; z-index: 9999;
}
.guide-panel.open { right: 0; }

.guide-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.guide-tab {
padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
cursor: pointer; font-size: 12px;
}
.guide-tab.active { background: var(--accent); color: #000; }

.guide-section { font-size: 13px; }

.alert-garantie { color: #ff6666; font-size: 11px; }
</style>
</head>
