<!-- version 6.3 -->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit Patrimoine V6 — Audit LPB</title>

    <style>
        /* ------------------------------
           RESET + BASE
        ------------------------------ */
        body {
            margin: 0;
            padding: 20px;
            font-family: "Inter", sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        h2 {
            margin-top: 40px;
            font-weight: 600;
        }

        /* ------------------------------
           MATERIAL DESIGN INPUTS
        ------------------------------ */
        .md-input {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .md-input input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #ccc;
            padding: 10px 5px 6px 5px;
            font-size: 15px;
            background: transparent;
            transition: border-color 0.25s;
        }

        .md-input input:focus {
            outline: none;
            border-bottom: 2px solid #007bff;
        }

        .md-input label {
            position: absolute;
            left: 5px;
            top: 12px;
            font-size: 15px;
            color: #777;
            pointer-events: none;
            transition: 0.25s ease;
        }

        .md-input input:focus + label,
        .md-input input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #007bff;
        }

        /* ------------------------------
           GRID 3 COLONNES (LTV / LTA / LTC)
        ------------------------------ */
        .triple-grid {
            display: flex;
            gap: 20px; /* léger séparateur visuel */
            margin-bottom: 20px;
        }

        .triple-grid .md-input {
            flex: 1; /* 33% / 33% / 33% */
        }

        /* ------------------------------
           BOUTON AUDITER
        ------------------------------ */
        .btn-audit {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.25s;
        }

        .btn-audit:hover {
            background: #005fcc;
        }

        /* ------------------------------
           TABLEAU DES AUDITS
        ------------------------------ */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: white;
        }

        table th, table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        table th {
            background: #f0f0f0;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <h2>Nouvel Audit LPB</h2>

    <!-- IDENTIFICATION -->
    <div class="md-input">
        <input id="projet" type="text" placeholder=" " />
        <label for="projet">Nom du projet</label>
    </div>

    <div class="md-input">
        <input id="montantProjet" type="number" placeholder="Ex : 350000" />
        <label for="montantProjet">Montant du projet (€)</label>
    </div>

    <div class="md-input">
        <input id="mise" type="number" placeholder="Ex : 1000" />
        <label for="mise">Votre mise (€)</label>
    </div>

    <!-- RATIOS FINANCIERS : LTV / LTA / LTC -->
    <div class="triple-grid">
        <div class="md-input">
            <input id="ltv" type="number" placeholder="Ex : 70" />
            <label for="ltv">LTV (%)</label>
        </div>

        <div class="md-input">
            <input id="lta" type="number" placeholder="Ex : 75" />
            <label for="lta">LTA (%)</label>
        </div>

        <div class="md-input">
            <input id="ltc" type="number" placeholder="Ex : 80" />
            <label for="ltc">LTC (%)</label>
        </div>
    </div>

    <!-- AUTRES RATIOS -->
    <div class="md-input">
        <input id="marge" type="number" placeholder="Ex : 12" />
        <label for="marge">Marge (%)</label>
    </div>

    <div class="md-input">
        <input id="precomm" type="number" placeholder="Ex : 30" />
        <label for="precomm">Pré-commercialisation (%)</label>
    </div>

    <div class="md-input">
        <input id="liquidite" type="number" placeholder="Ex : 7" />
        <label for="liquidite">Liquidité (1 à 10)</label>
    </div>

    <!-- BOUTON -->
    <button class="btn-audit" onclick="runEngine()">AUDITER & SAUVEGARDER</button>

    <!-- TABLEAU DES AUDITS -->
    <table id="auditTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Projet</th>
                <th>Type</th>
                <th>LTV</th>
                <th>LTA</th>
                <th>LTC</th>
                <th>Marge</th>
                <th>Pré-comm</th>
                <th>Liquidité</th>
                <th>Sûreté</th>
                <th>Couverture</th>
                <th>LTVNet</th>
                <th>Statut IA</th>
                <th>Ticket IA</th>
                <th>Mise</th>
                <th>Montant projet</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- -----------------------------------------------------------
         SOUS-BLOC 1 — MOTEUR IA v6
    ----------------------------------------------------------- -->
    <script>
        function computeIA(params) {
            const { ltv, lta, ltc, marge, precomm, liquidite, typeProjet } = params;

            const LTV = Number(ltv);
            const LTA = lta ? Number(lta) : null;
            const LTC = ltc ? Number(ltc) : null;
            const MARGE = marge ? Number(marge) : null;
            const PRE = precomm ? Number(precomm) : null;
            const LIQ = liquidite ? Number(liquidite) : null;

            let poidsLTV = 0.35;
            let poidsLTA = LTA !== null ? 0.15 : 0;
            let poidsLTC = LTC !== null ? 0.15 : 0;
            let poidsMarge = MARGE !== null ? 0.15 : 0.10;
            let poidsPre = PRE !== null ? 0.10 : 0.05;
            let poidsLiq = LIQ !== null ? 0.10 : 0.05;

            const sommePoids = poidsLTV + poidsLTA + poidsLTC + poidsMarge + poidsPre + poidsLiq;
            poidsLTV /= sommePoids;
            poidsLTA /= sommePoids;
            poidsLTC /= sommePoids;
            poidsMarge /= sommePoids;
            poidsPre /= sommePoids;
            poidsLiq /= sommePoids;

            const scoreLTV = Math.max(0, 100 - (LTV - 50) * 2);
            const scoreLTA = LTA !== null ? Math.max(0, 100 - (LTA - 60) * 1.5) : 0;
            const scoreLTC = LTC !== null ? Math.max(0, 100 - (LTC - 65) * 1.5) : 0;
            const scoreMarge = MARGE !== null ? Math.min(100, MARGE * 5) : 50;
            const scorePre = PRE !== null ? Math.min(100, PRE * 3) : 40;
            const scoreLiq = LIQ !== null ? LIQ * 10 : 50;

            const scoreIA =
                scoreLTV * poidsLTV +
                scoreLTA * poidsLTA +
                scoreLTC * poidsLTC +
                scoreMarge * poidsMarge +
                scorePre * poidsPre +
                scoreLiq * poidsLiq;

            let statutIA = "";
            if (scoreIA >= 80) statutIA = "SAFE";
            else if (scoreIA >= 65) statutIA = "PREMIUM";
            else if (scoreIA >= 50) statutIA = "TENDU";
            else statutIA = "CRITIQUE";

            let ticketIA = 0;
            if (statutIA === "SAFE") ticketIA = 1000;
            else if (statutIA === "PREMIUM") ticketIA = 700;
            else if (statutIA === "TENDU") ticketIA = 400;
            else ticketIA = 150;

            if (typeProjet === "LDT") {
                ticketIA = Math.round(ticketIA * 0.75);
            }

            return {
                scoreIA: Math.round(scoreIA),
                statutIA,
                ticketIA
            };
        }
    </script>

    <!-- -----------------------------------------------------------
         SOUS-BLOC 2 — MOTEUR ROBUSTE
    ----------------------------------------------------------- -->
    <script>
        function computeRobuste(params) {
            const { ltv, montantProjet, mise, couverturePonderee } = params;

            const LTV = Number(ltv);
            const montant = Number(montantProjet);
            const miseInvest = Number(mise);
            const couverture = Number(couverturePonderee);

            const montantPrete = (LTV / 100) * montant;

            const ltvNet = montantPrete > 0
                ? ((montantPrete - couverture) / montantPrete) * 100
                : 0;

            const surete = couverture / montantPrete;

            return {
                montantPrete: Math.round(montantPrete),
                ltvNet: Math.round(ltvNet),
                surete: Number(surete.toFixed(3))
            };
        }
    </script>

    <!-- -----------------------------------------------------------
         SOUS-BLOC 3 — FUSION + CSV + TABLEAU
    ----------------------------------------------------------- -->
    <script>
        function runEngine() {

            const projet = document.getElementById("projet").value;
            const montantProjet = document.getElementById("montantProjet").value;
            const mise = document.getElementById("mise").value;

            const ltv = document.getElementById("ltv").value;
            const lta = document.getElementById("lta").value;
            const ltc = document.getElementById("ltc").value;

            const marge = document.getElementById("marge").value;
            const precomm = document.getElementById("precomm").value;
            const liquidite = document.getElementById("liquidite").value;

            const typeProjet = montantProjet >= 200000 ? "MDB" : "LDT";

            if (!ltv) {
                alert("Veuillez renseigner le LTV pour lancer l’audit.");
                return;
            }

            const couverturePonderee = 0;

            const ia = computeIA({
                ltv, lta, ltc, marge, precomm, liquidite, typeProjet
            });

            const robuste = computeRobuste({
                ltv, montantProjet, mise, couverturePonderee
            });

            const date = new Date().toLocaleDateString("fr-FR");

            const row = [
                date,
                projet,
                typeProjet,
                ltv,
                lta || "",
                ltc || "",
                marge || "",
                precomm || "",
                liquidite || "",
                robuste.surete,
                couverturePonderee,
                robuste.ltvNet,
                ia.statutIA,
                ia.ticketIA,
                mise,
                montantProjet
            ];

            const table = document.querySelector("#auditTable tbody");
            const tr = document.createElement("tr");

            row.forEach(v => {
                const td = document.createElement("td");
                td.textContent = v;
                tr.appendChild(td);
            });

            table.appendChild(tr);
        }
    </script>
    <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
