<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoAnalyse v6 PRO</title>

<link rel="manifest" href="manifest.json">

<style>
/* ---------- THEMES ---------- */
:root {
--bg: #0f1012;
--bg-section: #18191c;
--bg-card: #202226;
--text: #e7e7ea;
--muted: #a0a0a8;
--accent: #4da3ff;
--border: #2a2c31;
--alert-yellow: #ffcc33;
}
.light {
--bg: #f5f6f8;
--bg-section: #ffffff;
--bg-card: #f3f4f7;
--text: #22252b;
--muted: #6b6f78;
--accent: #0077cc;
--border: #d0d3dc;
}

/* ---------- BASE ---------- */
body {
margin: 0;
padding: 0;
background: var(--bg);
color: var(--text);
font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ---------- INPUTS / BUTTONS / TABLE / SECTIONS ---------- */
input, select {
width: 100%; padding: 7px 8px; margin: 3px 0 9px 0;
border-radius: 6px; border: 1px solid var(--border);
background: #1b1d22; color: var(--text);
}
.light input, .light select { background: #ffffff; }

button {
padding: 10px 14px; background: var(--accent);
border: none; border-radius: 6px; color: #000;
font-weight: 600; cursor: pointer; font-size: 14px;
}
button:hover { background: #6bb4ff; }

.secondary {
background: transparent; border: 1px solid var(--accent); color: var(--accent);
padding: 6px 12px; border-radius: 6px; cursor: pointer;
}
.secondary:hover { background: var(--accent); color: #000; }

.section {
background: var(--bg-section);
border: 1px solid var(--border);
padding: 10px;
border-radius: 10px;
margin: 10px auto;
}

/* ---------- GUIDE PANEL ---------- */
.guide-panel {
position: fixed; top: 0; right: -380px; width: 360px; height: 100vh;
overflow-y: auto; background: var(--bg-section); border-left: 1px solid var(--border);
padding: 10px 12px; transition: right 0.3s ease; z-index: 9999;
}
.guide-panel.open { right: 0; }

/* ---------- GUIDE TABS ---------- */
.guide-tabs {
display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
}
.guide-tab {
padding: 6px 12px; border-radius: 6px;
background: var(--bg-card); border: 1px solid var(--border);
cursor: pointer; font-size: 13px; color: var(--text);
}
.guide-tab.active {
background: var(--accent); color: #000; border-color: var(--accent);
}

/* ---------- GUIDE SECTIONS ---------- */
.guide-section { display: none; }
.guide-section.active { display: block; }

/* ---------- ACCORDÉONS MATERIAL DESIGN ---------- */
.accordion {
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: 6px;
margin-bottom: 8px;
}
.accordion-header {
padding: 8px; cursor: pointer; font-size: 14px;
display: flex; justify-content: space-between; align-items: center;
}
.accordion-header:hover { background: var(--bg-section); }
.accordion-content {
display: none; padding: 8px; font-size: 13px; color: var(--muted);
border-top: 1px solid var(--border);
}
.accordion.open .accordion-content { display: block; }
.accordion-arrow { font-size: 12px; opacity: 0.7; }
</style>
</head>
